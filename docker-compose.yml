services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sdd
      POSTGRES_PASSWORD: sdd
      POSTGRES_DB: sdd
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdd -d sdd"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
